name: Bug report
description: Report a reproducible problem
labels: ["bug"]
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: "When I click the recovery button, the simulation freezes..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '/recovery'
        2. Click on 'Inject EC2 Crash'
        3. Click 'Trigger Recovery'
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: "The recovery workflow should execute all 7 steps..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: "The workflow stops at step 3 and never completes..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime environment.
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Node.js: v20.10.0
        - npm: v10.2.0
      value: |
        - OS:
        - Browser:
        - Node.js:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Console Output
      description: Paste any relevant error messages or console output.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: Drag and drop images here.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this bug?
      options:
        - Critical — Application crashes or data loss
        - High — Major feature broken, no workaround
        - Medium — Feature partially broken, workaround exists
        - Low — Minor issue, cosmetic, or edge case
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
      placeholder: "This only happens after injecting multiple failures in a row..."

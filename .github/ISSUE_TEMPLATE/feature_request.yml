name: Feature request
description: Propose an enhancement or new feature
labels: ["enhancement"]
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? What's the current limitation?
      placeholder: "I need to be able to monitor multiple EC2 instances simultaneously, but the dashboard only shows one..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed feature or enhancement.
      placeholder: "Add a multi-instance selector to the EC2 Monitor page that lets users switch between instances..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?
      placeholder: "I considered using separate browser tabs for each instance, but that's not practical..."

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in scope and out of scope for this feature?
      value: |
        **In scope:**
        -

        **Out of scope:**
        -

  - type: textarea
    id: risks
    attributes:
      label: Risks & Considerations
      description: Any potential downsides, complications, or dependencies?
      placeholder: "This may require changes to the CloudFormation templates to support multiple instances..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
      placeholder: "Here's a mockup of what the multi-instance selector could look like..."

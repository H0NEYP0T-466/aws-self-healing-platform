AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with Auto Scaling Group for the web tier

Parameters:
  EnvironmentName:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName

Resources:
  # ============================================================
  # IAM Role for EC2 (CloudWatch Agent + S3 Access)
  # ============================================================
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-blog-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3BackupAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${EnvironmentName}-blog-backups-*'
                  - !Sub 'arn:aws:s3:::${EnvironmentName}-blog-backups-*/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ============================================================
  # Launch Template
  # ============================================================
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${EnvironmentName}-blog-lt'
      LaunchTemplateData:
        InstanceType: t3.medium
        ImageId: ami-0c55b159cbfafe1f0  # Amazon Linux 2023 (update for region)
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: '${EnvironmentName}-web-sg'
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            # Update system
            yum update -y

            # Install CloudWatch Agent
            yum install -y amazon-cloudwatch-agent
            
            # Configure CloudWatch Agent
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'EOF'
            {
              "agent": {
                "metrics_collection_interval": 60,
                "run_as_user": "root"
              },
              "metrics": {
                "namespace": "BlogPlatform/EC2",
                "metrics_collected": {
                  "cpu": {
                    "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
                    "totalcpu": true
                  },
                  "mem": {
                    "measurement": ["mem_used_percent", "mem_available_percent"]
                  },
                  "disk": {
                    "measurement": ["disk_used_percent"],
                    "resources": ["/"]
                  }
                }
              },
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      {
                        "file_path": "/var/log/blog-app.log",
                        "log_group_name": "/blog-platform/application",
                        "log_stream_name": "{instance_id}"
                      },
                      {
                        "file_path": "/var/log/nginx/access.log",
                        "log_group_name": "/blog-platform/nginx-access",
                        "log_stream_name": "{instance_id}"
                      }
                    ]
                  }
                }
              }
            }
            EOF

            # Start CloudWatch Agent
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

            # Install Node.js for blog application
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            yum install -y nodejs nginx

            # Configure Nginx reverse proxy
            cat > /etc/nginx/conf.d/blog.conf << 'NGINX'
            server {
                listen 80;
                server_name _;
                
                location / {
                    proxy_pass http://localhost:3000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }

                location /health {
                    return 200 'OK';
                    add_header Content-Type text/plain;
                }
            }
            NGINX

            systemctl enable nginx
            systemctl start nginx

            echo "EC2 Setup Complete" > /var/log/blog-app.log

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${EnvironmentName}-blog-webserver'
              - Key: Environment
                Value: !Ref EnvironmentName

  # ============================================================
  # Auto Scaling Group
  # ============================================================
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub '${EnvironmentName}-blog-asg'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 1
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-blog-asg'
          PropagateAtLaunch: true

  # ============================================================
  # Scaling Policies
  # ============================================================
  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref AutoScalingGroup
  PublicIP:
    Description: Public IP of the web server
    Value: !Sub '${EnvironmentName}-blog-webserver'
